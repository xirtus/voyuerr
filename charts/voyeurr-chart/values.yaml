image:
  registry: ghcr.io
  repository: xirtus/voyuerr
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ''
  sha: ''

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

# Liveness / Readiness / Startup Probes
probes:
  # -- Configure liveness probe
  livenessProbe:
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 3
    # successThreshold: 1
    # failureThreshold: 3
  # -- Configure readiness probe
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 3
    # successThreshold: 1
    # failureThreshold: 3
  # -- Configure startup probe
  startupProbe: null
  #  tcpSocket:
  #    port: http

# -- Environment variables to add to the voyeurr pods
extraEnv: []
# -- Environment variables from secrets or configmaps to add to the voyeurr pods
extraEnvFrom: []

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # -- If not set and create is true, a name is generated using the fullname template
  name: ''

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  privileged: false
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

service:
  type: ClusterIP
  port: 80
  annotations: {}

# -- Creating PVC to store configuration
config:
  persistence:
    # -- Size of persistent disk
    size: 5Gi
    # -- Annotations for PVCs
    annotations: {}
    # -- Access modes of persistent disk
    accessModes:
      - ReadWriteOnce
    # -- Config name
    name: ''
    # -- Name of the permanent volume to reference in the claim.
    # Can be used to bind to existing volumes.
    volumeName: ''
    # -- Specify an existing `PersistentVolumeClaim` to use. If this value is provided, the default PVC will not be created
    existingClaim: ''
    # -- Subpath of the pvc which should be mounted
    subPath: ''
    # -- Storage class for the PVC. Set to "-" to disable dynamic provisioning. Uses default storage class if no value is provided
    storageClass: ''

ingress:
  enabled: false
  ingressClassName: ''
  annotations: {}
  #  kubernetes.io/ingress.class: nginx
  #  kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

route:
  main:
    # -- Enables or disables the Gateway API route
    enabled: false

    # -- Set the route apiVersion, e.g. gateway.networking.k8s.io/v1 or gateway.networking.k8s.io/v1alpha2
    apiVersion: gateway.networking.k8s.io/v1

    # -- Set the route kind.
    # Note that experimental kinds require changing `apiVersion`
    kind: HTTPRoute

    annotations: {}

    labels: {}

    parentRefs: []
    # - name: my-gateway
    #   namespace: gateway
    #   sectionName: https

    hostnames: []
    # - voyeurr.example.com

    additionalRules: []

    filters: []

    matches:
      - path:
          type: PathPrefix
          value: /

    # -- To redirect to HTTPS, create a new route object under the main route and enable this option.
    # This should only be used with HTTP-like routes, such as HTTPRoute or GRPCRoute.
    # [Reference]( https://gateway-api.sigs.k8s.io/guides/http-redirect-rewrite/ )
    httpsRedirect: false

resources: {}
# We usually recommend not to specify default resources and to leave this as a conscious
# choice for the user. This also increases chances charts run on environments with little
# resources, such as Minikube. If you do want to specify resources, uncomment the following
# lines, adjust them as necessary, and remove the curly braces after 'resources:'.
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi

# -- Additional volumes on the output StatefulSet definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# -- Additional volumeMounts on the output StatefulSet definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

# ─── Phase 6 Privacy & Phase 7 Deployment ───

# -- Environment variables for privacy/encryption
privacyEnv:
  # AES-256-GCM encryption key for sensitive DB fields
  encryptionKey: ""
  # HTTP proxy URL (optional VPN/proxy)
  httpProxy: ""
  # HTTPS proxy URL
  httpsProxy: ""
  # SOCKS5 proxy URL (VPN)
  socks5Proxy: ""

# -- Stash integration settings
stash:
  enabled: false
  hostname: ""
  port: 9999
  useSsl: false
  apiKey: ""
  syncSchedule: "0 3 * * *"

# -- Additional services deployed alongside Voyeurr
companionServices:
  whisparr:
    enabled: false
    image: hotio/whisparr:latest
    port: 6969
  jackett:
    enabled: false
    image: linuxserver/jackett:latest
    port: 9117
  prowlarr:
    enabled: false
    image: linuxserver/prowlarr:latest
    port: 9696
  qbittorrent:
    enabled: false
    image: linuxserver/qbittorrent:latest
    port: 8080
  jellyfin:
    enabled: false
    image: jellyfin/jellyfin:latest
    port: 8096
  stash:
    enabled: false
    image: stashapp/stash:latest
    port: 9999

affinity: {}
