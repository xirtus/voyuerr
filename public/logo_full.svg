<svg width="512" height="128" viewBox="0 0 512 128" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Eye icon — stylized eye shape -->
  <g transform="translate(24, 16)">
    <!-- Outer eye shape -->
    <path d="M64 96C99.346 96 128 67.346 128 32C128 -3.346 99.346 -32 64 -32C28.654 -32 0 -3.346 0 32C0 67.346 28.654 96 64 96Z" 
          fill="url(#eyeGradient)"/>
    <!-- Iris/pupil -->
    <circle cx="64" cy="32" r="24" fill="#1a0a1e"/>
    <!-- Inner highlight -->
    <circle cx="56" cy="24" r="8" fill="white" opacity="0.3"/>
    <circle cx="72" cy="38" r="4" fill="white" opacity="0.15"/>
    <!-- Eyelash detail — top curve -->
    <path d="M16 16C16 16 32 0 64 0C96 0 112 16 112 16" 
          stroke="#ff3366" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Eyelash detail — bottom curve -->
    <path d="M16 48C16 48 32 64 64 64C96 64 112 48 112 48" 
          stroke="#ff3366" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- "voyuerr" wordmark -->
  <text x="168" y="72" font-family="'Inter',system-ui,-apple-system,sans-serif" font-weight="800" font-size="56" letter-spacing="-0.5" fill="white">voyuerr</text>

  <!-- Tagline -->
  <text x="172" y="100" font-family="'Inter',system-ui,-apple-system,sans-serif" font-weight="400" font-size="14" letter-spacing="3" fill="#ff3366" opacity="0.7">ADULT MEDIA REQUESTS</text>

  <defs>
    <!-- Red/crimson gradient for the eye -->
    <linearGradient id="eyeGradient" x1="64" y1="-32" x2="64" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff3366"/>
      <stop offset="0.5" stop-color="#e62255"/>
      <stop offset="1" stop-color="#cc1144"/>
    </linearGradient>
  </defs>

</svg>
