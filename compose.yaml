volumes:
  voyeurr_config:
  voyeurr_db:
  whisparr_config:
  jackett_config:
  prowlarr_config:
  qbit_config:
  jellyfin_config:
  stash_config:
  # traefik_letsencrypt:

networks:
  voyeurr_net:
    driver: bridge
