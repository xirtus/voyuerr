# ═══════════════════════════════════════════════════════════
# Voyeurr Full Stack — Docker Compose
# 
# Complete adult media automation stack:
# voyeurr + whisparr + jackett/prowlarr + qBittorrent + jellyfin + stash
#
# Phase 7 — Documentation, Testing & Deployment
# ═══════════════════════════════════════════════════════════

services:
  voyeurr:
    image: ghcr.io/xirtus/voyuerr:latest
    container_name: voyeurr
    restart: unless-stopped
    ports:
      - "5055:5055"
    environment:
      - NODE_ENV=production
      - CONFIG_DIRECTORY=/app/config
      # Phase 6: Encryption key for sensitive DB fields
      - VOYEURR_ENCRYPTION_KEY=${VOYEURR_ENCRYPTION_KEY:-}
      # Phase 6: Proxy/VPN configuration
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - SOCKS5_PROXY=${SOCKS5_PROXY:-}
    volumes:
      - voyeurr_config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voyeurr_net

  postgres:
    image: postgres:16-alpine
    container_name: voyeurr-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=voyeurr
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-voyeurr}
      - POSTGRES_DB=voyeurr
    volumes:
      - voyeurr_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voyeurr"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voyeurr_net

  whisparr:
    image: hotio/whisparr:latest
    container_name: whisparr
    restart: unless-stopped
    ports:
      - "6969:6969"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - whisparr_config:/config
      - ./media/downloads:/downloads
      - ./media/library:/library
    networks:
      - voyeurr_net

  jackett:
    image: linuxserver/jackett:latest
    container_name: jackett
    restart: unless-stopped
    ports:
      - "9117:9117"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - jackett_config:/config
    networks:
      - voyeurr_net

  # Alternative: Prowlarr (recommended over Jackett for better *arr integration)
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - "9696:9696"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - prowlarr_config:/config
    networks:
      - voyeurr_net

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - WEBUI_PORT=8080
    volumes:
      - qbit_config:/config
      - ./media/downloads:/downloads
    networks:
      - voyeurr_net

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - jellyfin_config:/config
      - ./media/library:/media
    networks:
      - voyeurr_net

  stash:
    image: stashapp/stash:latest
    container_name: stash
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      - STASH_STASH=/root/.stash
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    volumes:
      - stash_config:/root/.stash
      - ./media/library:/media:ro
    networks:
      - voyeurr_net

  # ═══════════════════════════════════════════════════════════
  # VPN tunnel (recommended for privacy)
  # Routes all download traffic through a VPN provider.
  # Uncomment and configure with your VPN credentials.
  # Supports: Mullvad, ProtonVPN, NordVPN, PIA, etc.
